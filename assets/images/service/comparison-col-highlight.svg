<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600" fill="none">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#5EE0B6" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#2F8F5B" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0F2A20" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="100%" r="70%" fx="50%" fy="100%">
      <stop offset="0%" stop-color="#5EE0B6" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#2F8F5B" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0F2A20" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EE0B6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#5EE0B6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5EE0B6" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="border-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EE0B6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#5EE0B6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5EE0B6" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Background fill -->
  <rect width="400" height="600" rx="16" fill="#0F2A20" fill-opacity="0.35"/>
  <!-- Radial glow top -->
  <rect width="400" height="600" rx="16" fill="url(#glow1)"/>
  <!-- Radial glow bottom -->
  <rect width="400" height="600" rx="16" fill="url(#glow2)"/>
  <!-- Left border line -->
  <rect x="0" y="0" width="0.5" height="600" fill="url(#border-left)"/>
  <!-- Right border line -->
  <rect x="399.5" y="0" width="0.5" height="600" fill="url(#border-right)"/>
</svg>
